name: Release CmdEdit

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v
        required: false
        default: "0.1.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    env:
      CMDEDIT_BUNDLE_ID: com.zijiecai.cmdedit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version || '0.1.0' }}"
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build app bundle
        shell: bash
        run: bash CmdEdit/Scripts/build.sh "${{ steps.version.outputs.value }}"

      - name: Import signing certificate
        id: import-signing-certificate
        env:
          APPLE_SIGNING_CERT_BASE64: ${{ secrets.APPLE_SIGNING_CERT_BASE64 }}
          APPLE_SIGNING_CERT_PASSWORD: ${{ secrets.APPLE_SIGNING_CERT_PASSWORD }}
        shell: bash
        run: |
          CERT_PATH="$RUNNER_TEMP/cmdedit-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/cmdedit-signing.keychain-db"
          echo "$APPLE_SIGNING_CERT_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_SIGNING_CERT_PASSWORD" -A -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | sed -n 's/.*"\(.*Developer ID Application.*\)"/\1/p' | head -n 1)
          if [[ -z "$IDENTITY" ]]; then
            echo "No Developer ID Application identity found after certificate import."
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
            exit 1
          fi
          echo "Resolved signing identity: $IDENTITY"
          echo "identity=$IDENTITY" >> "$GITHUB_OUTPUT"

      - name: Codesign app
        shell: bash
        run: |
          codesign --force --deep --options runtime --timestamp \
            --sign "${{ steps.import-signing-certificate.outputs.identity }}" \
            CmdEdit/build/CmdEdit.app

      - name: Verify codesign
        shell: bash
        run: |
          codesign --verify --deep --strict --verbose=2 CmdEdit/build/CmdEdit.app

      - name: Create unsigned-notarization zip
        shell: bash
        run: |
          ditto -c -k --sequesterRsrc --keepParent CmdEdit/build/CmdEdit.app CmdEdit/build/CmdEdit-${{ steps.version.outputs.value }}-unsigned.zip

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          xcrun notarytool submit CmdEdit/build/CmdEdit-${{ steps.version.outputs.value }}-unsigned.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Staple notarization ticket
        shell: bash
        run: xcrun stapler staple CmdEdit/build/CmdEdit.app

      - name: Verify notarized app
        shell: bash
        run: spctl --assess --type execute --verbose=2 CmdEdit/build/CmdEdit.app

      - name: Create release zip
        shell: bash
        run: |
          mkdir -p release
          ditto -c -k --sequesterRsrc --keepParent CmdEdit/build/CmdEdit.app release/CmdEdit-${{ steps.version.outputs.value }}.zip
          shasum -a 256 release/CmdEdit-${{ steps.version.outputs.value }}.zip > release/CmdEdit-${{ steps.version.outputs.value }}.sha256

      - name: Upload release assets
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/CmdEdit-${{ steps.version.outputs.value }}.zip
            release/CmdEdit-${{ steps.version.outputs.value }}.sha256
